version: '3.8'

services:
  # ──────────────────────────────────────────────
  # Database Service (PostgreSQL)
  # ──────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: vessify_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: vessify
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: supersecretpassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d vessify"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────
  # Backend API Service (Hono)
  # ──────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vessify_backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://postgres:supersecretpassword@postgres:5432/vessify?schema=public
      BETTER_AUTH_SECRET: supersecretauthkeymustbe32charslongormore
      BETTER_AUTH_URL: http://localhost:3001
      FRONTEND_URL: http://localhost:3000
      RATE_LIMIT_MAX: 100
      RATE_LIMIT_WINDOW_MS: 60000
    depends_on:
      postgres:
        condition: service_healthy

  # ──────────────────────────────────────────────
  # Frontend Service (Next.js)
  # ──────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: vessify_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      NEXT_PUBLIC_API_URL: http://localhost:3001
    depends_on:
      - backend

volumes:
  postgres_data:
